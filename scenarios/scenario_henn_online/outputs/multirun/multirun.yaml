hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: outputs/multirun/
    subdir: ${data_card.source.filepath}/${hydra:runtime.choices.scenario}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params:
      data_card.source.filepath: 29s-40-30-0.txt, 30s-40-45-0.txt, 31s-40-60-0.txt,
        32s-40-75-0.txt, 37s-60-30-0.txt, 38s-60-45-0.txt, 39s-60-60-0.txt, 40s-60-75-0.txt,
        61s-80-30-0.txt, 62s-80-45-0.txt, 63s-80-60-0.txt, 64s-80-75-0.txt, 69s-100-30-0.txt,
        70s-100-45-0.txt, 72s-100-75-0.txt
      data_card.objective: makespan
      scenario: scenario_henn_waiting, scenario_henn_order_window_waiting
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: CRITICAL
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: CRITICAL
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra: []
    task: []
  job:
    name: experiment_henn
    chdir: null
    override_dirname: ''
    id: ???
    num: ???
    config_name: henn_online_config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys:
        - data_card
        - scenario
  runtime:
    version: 1.3.2
    version_base: '1.1'
    cwd: C:\Users\zm0714\Documents\Projekte\casim\scenarios\scenario_henn_online
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: C:\Users\zm0714\Documents\Projekte\casim\scenarios\scenario_henn_online\config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      sweep: waiting_strategy_sweep
      cosy_repo: baseline_waiting_henn
      scenario: scenario_henn_order_window_waiting
      data_card: henn
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
luigi:
  log_level: CRITICAL
  logdir: null
  background: null
  logging_conf_file: null
project_root: ${hydra:runtime.cwd}
data_dir: ${project_root}/data
instances_base: ${data_dir}/
cache_base: ${instances_base}/caches
verbose: true
viz:
  launch: false
  port: 8050
experiment:
  name: ${data_card.name}
  output_dir: ${hydra:runtime.output_dir}
  instance_name: ${data_card.name}/${hydra:runtime.choices.cosy_repo}_${data_card.objective}
data_card:
  name: HennOnline
  problem_type: OBRSP
  objective: makespan
  source:
    data_loader: HennOnlineLoader
    filepath: 72s-100-75-0.txt
  layout:
    type: conventional
    objects:
    - name: LayoutParams
      features:
      - name: start_node
      - name: end_node
      - name: closest_node_to_start
      - name: dist_pick_locations
      - name: dist_aisle_location
      - name: dist_aisle
      - name: dist_start
      - name: dist_end
      - name: n_aisles
      - name: n_pick_locations
      - name: n_blocks
        value: 1
      - name: dist_top_to_pick_location
      - name: dist_bottom_to_pick_location
      - name: start_location
      - name: end_location
      - name: min_aisle_position
      - name: max_aisle_position
    - name: LayoutNetwork
      features:
      - name: graph
      - name: distance_matrix
      - name: predecessor_matrix
  articles:
    type: standard
    objects:
    - name: Article
      features:
      - name: article_id
  orders:
    type: standard
    objects:
    - name: Order
      features:
      - name: order_number
      - name: order_date
      objects:
      - name: OrderPosition
        features:
        - name: amount
        - name: article_id
  resources:
    type: human
    objects:
    - name: Resource
      type: human
      features:
      - name: speed
      - name: time_per_pick
      objects:
      - name: PickCart
        type: manual
        features:
        - name: capacities
        - name: dimensions_type
          value:
          - items
  storage:
    type: dedicated
    objects:
    - name: StorageLocations
      features:
      - name: amount
      - name: article_id
scenario:
  decision_engine:
    problems:
      OBRSP:
        solver:
          _target_: casim.pipelines.pipeline_runner.CoSySolver
          solution_ranker:
            _target_: casim.pipelines.solution_ranker.SolutionRanker
            objective: ${data_card.objective}
          repo: ${cosy_repo}
        commitment_policy:
          _target_: casim.decision_engine.decision_engine.SchedulingCommitmentPolicy
          n_jobs: 1
  simulation_engine:
    problems:
      OBRSP:
        state_adapter:
          _target_: casim.simulation_engine.state_adapter.OrderWindowAdapter
        triggers:
        - OrderArrival
        - PickerIdle
        - FlushRemainingOrders
        conditions:
        - _target_: casim.simulation_engine.conditions.NbrPickersCondition
          threshold: 1
        - _target_: casim.simulation_engine.conditions.NbrOrdersCondition
          threshold: 5
cosy_repo:
  components:
  - casim.pipelines.problem_based_template.InstanceLoader
  - casim.pipelines.subproblems.item_assingment.GreedyIA
  - casim.pipelines.subproblems.batching.FiFo
  - casim.pipelines.subproblems.picker_routing.SShapeHenn
  - casim.pipelines.subproblems.sequencing.SPTSequencing
  - casim.pipelines.problem_based_template.ResultAggregationSequencing

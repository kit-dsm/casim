name: "IWSPE"
problem_type: OSRP

objective: Distance
source:
  data_loader: IWSPELoader
  orders_path: "orders.csv"
  layout_path: "layout.csv"

features:
  layout:
    type:
      - conventional
    features:
      start_node: [0, 0]
      end_node: [0, 0]
      closest_node_to_start: [0, 0]
      min_aisle_position: 0
      max_aisle_position: 10
      n_pick_locations: 50
      dist_pick_locations: 1.5
      dist_bottom_to_pick_location: 0
      n_blocks: 2
      graph: true
      dima: true

  resources:
    type:
      - mixed
    features:
      n_pickers: 24
      picker_speed: 2306  # 8.3 km/h -> 2.31 m/s
      speed_follow_mode: 1389  # 5 km/h
      time_per_pick: 19  # 19 / 21.27
      time_per_pick_cobot: 15.77  # 15.77 / 17.65
      tour_setup_time: 215 # 90
      aisle_congestion_rate: 0.06  # 6%
      distribution_cobots: 0.5

  orders:
    type:
      - standard
    features:
      order_date: true
      due_date: true

  storage:
    type:
      - dedicated
    features:

  warehouse_info:
    type:
      - online
    features:
      breaks: []
defaults:
  - data_cards: iopvrp # iwspe #iopvrp
  - simulation: OBSRP # sequential #OBSRP
  - optional sweep: None # cobot_distribution

hydra:
  job_logging:
    root:
      level: CRITICAL
  hydra_logging:
    root:
      level: CRITICAL

project_root: ${hydra:runtime.cwd}/..
data_dir: ${project_root}/data
instances_base: ${data_dir}/instances
cache_base: ${instances_base}/caches
verbose: True

experiment:
  name: ${data_cards.name}
  output_dir: ${project_root}/experiments/online/output/${data_cards.name}
  instance_name: ${experiment.name}/${now:%Y-%m-%d_%H-%M-%S}


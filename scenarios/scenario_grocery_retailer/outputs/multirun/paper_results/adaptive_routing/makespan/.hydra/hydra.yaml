hydra:
  run:
    dir: outputs/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: outputs/multirun/paper_results
    subdir: ${hydra:runtime.choices.cosy_repo}/${data_card.objective}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params:
      cosy_repo: return, midpoint, largest_gap, nearest_neighbour, sshape, adaptive_routing
      data_card.objective: makespan
      scenario.simulation_engine.problems.ORSP.conditions.2.threshold: '98'
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: CRITICAL
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: CRITICAL
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra: []
    task:
    - cosy_repo=adaptive_routing
    - data_card.objective=makespan
    - scenario.simulation_engine.problems.ORSP.conditions.2.threshold=98
  job:
    name: experiment_grocery_retailer
    chdir: null
    override_dirname: cosy_repo=adaptive_routing,data_card.objective=makespan,scenario.simulation_engine.problems.ORSP.conditions.2.threshold=98
    id: '5'
    num: 5
    config_name: grocery_retailer_config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys:
        - data_card
        - scenario
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: C:\Users\zm0714\Documents\Projekte\casim\scenarios\scenario_grocery_retailer
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: C:\Users\zm0714\Documents\Projekte\casim\scenarios\scenario_grocery_retailer\config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: C:\Users\zm0714\Documents\Projekte\casim\scenarios\scenario_grocery_retailer\outputs\multirun\paper_results\adaptive_routing\makespan
    choices:
      sweep: cosy_repo_sweep
      cosy_repo: adaptive_routing
      scenario: scenario_grocery_fixed_arrival
      data_card: grocery_retailer
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false

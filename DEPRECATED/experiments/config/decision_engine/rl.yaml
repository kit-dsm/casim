triggers:
  ShiftStart: OBP
  PickerArrival: OS
  TourEnd: OS
  PickListSelectionDone: ORP

conditions:
  OBP:
    _target_: ware_ops_sim.sim.conditions.NumberOrdersCondition
    threshold: 1

  OS:
    _target_: ware_ops_sim.sim.conditions.NumberPickListCondition
    threshold: 1

  ORP:
    _target_:  ware_ops_sim.sim.conditions.TrueCondition

execution:
  OBP:
    _target_: experiments.experiment_commons.CoSyRunner
    endpoint: EvaluationPickList
    problem_class: OBP

  ORP:
    _target_: experiments.experiment_commons.FixedRunnerSPRP
    endpoint: None
    problem_class: ORP

state_transformer:
  OBP:
    _target_: ware_ops_sim.sim.state.state_transformer.BatchStateTransformer
  OS:
    _target_: ware_ops_sim.sim.state.state_transformer.RLStateTransformer
  ORP:
    _target_: ware_ops_sim.sim.state.state_transformer.SPRPStateTransformer

learnable_problems:
  - OS


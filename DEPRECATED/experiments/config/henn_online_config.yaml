defaults:
  - data_card: henn # iwspe #iopvrp
  - decision_engine: reopt_henn # batch_full_henn # sequential_henn #OBSRP
  - optional sweep: None # cobot_distribution

hydra:
  job_logging:
    root:
      level: CRITICAL
  hydra_logging:
    root:
      level: CRITICAL

project_root: ${hydra:runtime.cwd}/..
data_dir: ${project_root}/data
instances_base: ${data_dir}/instances
cache_base: ${instances_base}/caches
verbose: True

experiment:
  name: ${data_card.name}
  output_dir: ${project_root}/experiments/online/output/${data_card.name}
  instance_name: ${experiment.name}/${now:%Y-%m-%d_%H-%M-%S}


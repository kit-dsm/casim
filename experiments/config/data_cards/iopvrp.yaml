name: "IOPVRP"
problem_type: OSRP

objective: Distance
source:
  data_loader: IOPVRPLoader
  order_list_path: "OrderList_LargeProblems_1_1.txt"
  order_line_path: "OrderLineList_LargeProblems_1_1.txt"

features:
  layout:
    type:
      - conventional
    features:
      start_node: [0, 0]
      end_node: [0, 0]
      closest_node_to_start: [0, 0]
      min_aisle_position: 0
      max_aisle_position: 10
      n_pick_locations: 240
      n_aisles: 12
      n_subaisles: 24
      dist_pick_locations: 1.3
      pick_aisle_width: 3.0
      cross_aisle_width: 6.0
      dist_bottom_to_pick_location: 1
      n_blocks: 2
      graph: true
      dima: true

  resources:
    type:
      - human
    features:
      n_pickers: 4
      picker_speed: 1  # 8.3 km/h -> 2.31 m/s
      time_per_pick: 10  # 19 / 21.27
      capacity: 10
      time_per_pick_cobot: 15.77  # 15.77 / 17.65
      tour_setup_time: 180 # 90
      aisle_congestion_rate: 0.06  # 6%
      distribution_cobots: 0.5

  orders:
    type:
      - standard
    features:
      order_date: true
      due_date: true

  storage:
    type:
      - dedicated
    features:

  warehouse_info:
    type:
      - online
    features:
      breaks: []